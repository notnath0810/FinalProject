<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 130">
  <defs>
    <clipPath id="sh">
      <path d="M22,8 L98,8 L98,72 Q98,102 60,117 Q22,102 22,72 Z"/>
    </clipPath>
  </defs>

  <!-- Laurel wreath — left -->
  <path d="M22,10 Q13,42 12,72 Q14,98 26,112" fill="none" stroke="#1c9c42" stroke-width="1.5"/>
  <ellipse cx="15" cy="28" rx="5" ry="9" transform="rotate(-55,15,28)" fill="#1c9c42"/>
  <ellipse cx="10" cy="46" rx="5" ry="9" transform="rotate(-38,10,46)" fill="#1c9c42"/>
  <ellipse cx="9"  cy="63" rx="5" ry="9" transform="rotate(-18, 9,63)" fill="#1c9c42"/>
  <ellipse cx="11" cy="80" rx="5" ry="9" transform="rotate(  7,11,80)" fill="#1c9c42"/>
  <ellipse cx="17" cy="95" rx="5" ry="9" transform="rotate( 30,17,95)" fill="#1c9c42"/>
  <ellipse cx="26" cy="108" rx="5" ry="9" transform="rotate(52,26,108)" fill="#1c9c42"/>

  <!-- Laurel wreath — right -->
  <path d="M98,10 Q107,42 108,72 Q106,98 94,112" fill="none" stroke="#1c9c42" stroke-width="1.5"/>
  <ellipse cx="105" cy="28"  rx="5" ry="9" transform="rotate( 55,105,28)"  fill="#1c9c42"/>
  <ellipse cx="110" cy="46"  rx="5" ry="9" transform="rotate( 38,110,46)"  fill="#1c9c42"/>
  <ellipse cx="111" cy="63"  rx="5" ry="9" transform="rotate( 18,111,63)"  fill="#1c9c42"/>
  <ellipse cx="109" cy="80"  rx="5" ry="9" transform="rotate( -7,109,80)"  fill="#1c9c42"/>
  <ellipse cx="103" cy="95"  rx="5" ry="9" transform="rotate(-30,103,95)"  fill="#1c9c42"/>
  <ellipse cx="94"  cy="108" rx="5" ry="9" transform="rotate(-52, 94,108)" fill="#1c9c42"/>

  <!-- Shield — coloured sections (clipped) -->
  <rect x="22" y="8"  width="38" height="52" clip-path="url(#sh)" fill="#cc1a1a"/>
  <rect x="60" y="8"  width="38" height="52" clip-path="url(#sh)" fill="#1a44cc"/>
  <rect x="22" y="60" width="76" height="60" clip-path="url(#sh)" fill="#1c9c42"/>

  <!-- Shield outline + dividers -->
  <path d="M22,8 L98,8 L98,72 Q98,102 60,117 Q22,102 22,72 Z"
        fill="none" stroke="white" stroke-width="2.5"/>
  <line x1="60" y1="8"  x2="60" y2="60" stroke="white" stroke-width="2"/>
  <line x1="22" y1="60" x2="98" y2="60" stroke="white" stroke-width="2"/>

  <!-- RED SECTION — globe with cross -->
  <!-- cross (top of globe) -->
  <line x1="41" y1="13" x2="41" y2="19" stroke="white" stroke-width="3"/>
  <line x1="37" y1="16" x2="45" y2="16" stroke="white" stroke-width="3"/>
  <!-- globe -->
  <circle cx="41" cy="34" r="13" fill="none" stroke="white" stroke-width="1.5"/>
  <ellipse cx="41" cy="34" rx="6.5" ry="13" fill="none" stroke="white" stroke-width="1"/>
  <line x1="28" y1="34" x2="54" y2="34" stroke="white" stroke-width="1"/>

  <!-- BLUE SECTION — chapel -->
  <polygon points="65,43 79,27 93,43" fill="white"/>
  <rect x="68" y="43" width="22" height="17" fill="white"/>
  <rect x="74" y="48" width="10" height="12" fill="#1a44cc"/>
  <!-- cross on roof -->
  <line x1="79" y1="28" x2="79" y2="34" stroke="#1a44cc" stroke-width="2"/>
  <line x1="76" y1="31" x2="82" y2="31" stroke="#1a44cc" stroke-width="2"/>

  <!-- GREEN SECTION — three stars + open book -->
  <circle cx="46" cy="68" r="3.5" fill="white"/>
  <circle cx="60" cy="68" r="3.5" fill="white"/>
  <circle cx="74" cy="68" r="3.5" fill="white"/>

  <rect x="34" y="80" width="52" height="26" rx="2" fill="white"/>
  <line x1="60" y1="80" x2="60" y2="106" stroke="#1c9c42" stroke-width="2"/>
  <path d="M34,80 Q47,75 60,80" fill="none" stroke="#1c9c42" stroke-width="1.5"/>
  <path d="M60,80 Q73,75 86,80" fill="none" stroke="#1c9c42" stroke-width="1.5"/>
  <line x1="39" y1="87" x2="57" y2="87" stroke="#1c9c42" stroke-width="1"/>
  <line x1="39" y1="93" x2="57" y2="93" stroke="#1c9c42" stroke-width="1"/>
  <line x1="39" y1="99" x2="57" y2="99" stroke="#1c9c42" stroke-width="1"/>
  <line x1="63" y1="87" x2="81" y2="87" stroke="#1c9c42" stroke-width="1"/>
  <line x1="63" y1="93" x2="81" y2="93" stroke="#1c9c42" stroke-width="1"/>
  <line x1="63" y1="99" x2="81" y2="99" stroke="#1c9c42" stroke-width="1"/>
</svg>
